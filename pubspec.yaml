name: la_facu
description: "Plataforma de organización premium para estudiantes universitarios."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^14.6.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Diseño & Animaciones
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Íconos
  cupertino_icons: ^1.0.8

  # DB Local (Persistencia)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # APIs Google
  googleapis: ^13.1.0
  googleapis_auth: ^1.6.0
  

  # Calendario UI
  table_calendar: ^3.2.0
  
  # Utils
  http: ^1.2.0
  intl: ^0.20.0
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9
  msix: ^3.16.1

msix_config:
  display_name: La Facu
  publisher_display_name: EstudioForge Team
  publisher: CN=EstudioForge
  identity_name: com.estudioforge.lafacu
  msix_version: 1.0.0.0
  logo_path: assets/icon/icon.png
  capabilities: internetClient, internetClientServer
  architecture: x64

flutter:
  uses-material-design: true
